<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UK BirdCast</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">Research preview</p>
        <h1>UK BirdCast</h1>
      </div>
      <div id="statusBadge" class="badge">Loading</div>
    </header>
    <div id="staleBanner" class="stale-banner" hidden></div>
    <nav class="view-tabs" aria-label="Map view">
      <button class="tab active" data-view="reanalysis">Reanalysis</button>
      <button class="tab" data-view="forecast">96-hour forecast</button>
    </nav>
    <main>
      <section class="map-workspace">
        <div class="map-toolbar">
          <div>
            <strong id="validTime">Loading</strong>
            <span id="leadTime"></span>
          </div>
          <label class="toggle"><input id="uncertaintyToggle" type="checkbox"> Uncertainty</label>
        </div>
        <canvas id="mapCanvas" width="1000" height="760" aria-label="UK bird density map"></canvas>
        <div class="timeline">
          <button id="playButton" class="icon-button" title="Play forecast" aria-label="Play forecast">▶</button>
          <input id="timeSlider" type="range" min="0" max="0" value="0" aria-label="Forecast time">
        </div>
        <div class="legend"><span>Low</span><i></i><span>High density</span></div>
      </section>
      <aside>
        <section>
          <h2>Run status</h2>
          <dl id="statusList"></dl>
        </section>
        <section>
          <h2>Radar network</h2>
          <div id="radarList" class="radar-list"></div>
        </section>
        <section>
          <h2>Validation</h2>
          <p id="validationText">Loading validation status.</p>
        </section>
      </aside>
    </main>
    <footer>
      ECMWF weather data: CC BY 4.0. BTO products are used for aggregate ecological validation, not radar calibration.
    </footer>
    <script src="app.js"></script>
  </body>
</html>
