# Install as /etc/nginx/sites-available/birdcast-uk.conf and symlink into sites-enabled.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name uk-birdcast-workstation-ssh uk-birdcast 130.246.212.190 _;

    access_log /var/log/nginx/birdcast-uk-access.log;
    error_log /var/log/nginx/birdcast-uk-error.log;

    root /opt/birdcast-uk/site;
    index index.html;

    location ^~ /live-uk-bird-maps/ {
        alias /opt/birdcast-uk/site/;
        add_header Cache-Control "no-store";
    }

    location ^~ /birdcast-uk/ {
        rewrite ^/birdcast-uk/(.*)$ /live-uk-bird-maps/$1 permanent;
    }

    location = / {
        return 302 /live-uk-bird-maps/;
    }
}
